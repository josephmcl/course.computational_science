<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta http-equiv="x-ua-compatible" content="ie=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>CS 410</title>
  <style>
    @font-face {
      font-family: cm;
      src: url('/static/font/cmunrm.ttf');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: cmbd;
      src: url('/static/font/cmunrb.ttf');
      font-weight: bold;
      font-style: normal;
    }
    @font-face {
      font-family: cmit;
      src: url('/static/font/cmunci.ttf');
      font-weight: italic;
      font-style: normal;
    }
    html {margin: 0px auto; background: #faf8f7; color: #26261f; 
      font-family: cm; text-align: center;}
    body {margin: 0px auto; text-align: left; 
      max-width: 400px; background: #f6f0ee; position: relative;
       padding-bottom: 4em;}
    header {
      color: #526a56;
      position: relative;
      background-color: #efe1e3; padding-top: 1em; padding-left: 2em;
    }
    header,
    header * {
      -webkit-user-select: none;
      user-select: none;
    }
    /*
    header::after {
      position: absolute;
      font-family: cmit;
      content: "Spring session";
      background-color: #efe1e3;
      border-radius: 20px;
      padding: 2px;
      padding-left: 0.5em;
      padding-right: 0.5em;
      width: 7em;
      text-align: center;
      left: calc(50% - 4em);
      bottom: -0.6em;
    }*/
    #spring-badge {
      position: absolute;
      font-family: cmit;
      background-color: #efe1e3;
      border-radius: 20px;
      padding: 2px 0.5em;
      width: 7em;
      text-align: center;
      left: calc(50% - 4em);
      bottom: -0.6em;
      cursor: pointer;
      user-select: none;
      z-index: 5;
    }

    .flower-burst {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      font-size: 1.4rem;
      will-change: transform, opacity;
      animation: flower-float 900ms ease-out forwards;
      z-index: 9999;
    }

    @keyframes flower-float {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1.0) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(1.0) rotate(var(--rot));
      }
    }
    pre {margin: 0; text-align: left; 
      font-family: 'Fira Mono', monospace; 
      border-right: solid #bbb 2px; max-width: 43rem; 
      padding-top: 2em; padding-bottom: 2em; padding-left: 2em;}
    a { color: #393a3c; text-decoration: none; }
    a { color: #516f9c; }
    /*pre a::after {content: " 🔗";}
    pre a.nojunk::after {content: "";}
    pre b { color: #4f55ff; text-decoration: none; } */
    h1 { color: #526a56; font-family: cmbd; font-size: 1.25em;}
    h3 {font-family: cmbd; } 
    b {font-family: cmbd; } 
    ul {max-width: 400px; text-align: left; 
      list-style-position: inside; list-style-type: square; 
      padding-left: 1em; }
    ul > li { display:list-item; margin-right: 2em; max-width: 100%; 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
    #icon {display: block; position: absolute; left: 1.75em; top: 3em; 
      transform: rotate(-10deg);
      height: 4.5em; filter: invert(39%) sepia(12%) saturate(597%) hue-rotate(74deg) brightness(91%) contrast(86%);}
    #fcon {display: block; position: absolute; 
      left: calc(200px - 1em); bottom: -6em; height: 3em; 
      transform: rotate(180deg);}
    details {padding-top: 1em; max-width: 400px; 
      border: 1px solid ffffb6; border-right: none;}
    details[open] {border: 1px solid black; margin: 1em; 
      margin-left: 0; border-left: none; border-right: none; 
      background-color: #e9f3e7;}
    details > summary::-webkit-details-marker {
      display: none;         /* Chrome/Safari */
    }
    details > summary {
      list-style: none;      /* Firefox */
    }
    details > summary::before {
      content: "▷";/*"☞";*/          /* closed */
      display: inline-block;
      width: 2em;            /* aligns nicely */
      transform-origin: 50% 50%;
      transition: transform 120ms ease;
    }

    /* rotate when open */
    details[open] > summary::before {
      transform: rotate(90deg)  translateX(8px); /* ▸ -> ▾ */
    }
    .nodot{ list-style: none; }
    #current {
      border-radius: 1px;
      border: 3px double #bf8e93; padding-left: 5px; 
      position: relative; margin-right: 20px;
      margin-top: 2em;
    }
    #current::before {
      content: "CURRENT TOPIC";
      font-family: sans-serif;
      font-weight: bold;
      font-size: 0.75em;
      color: #bf8e93;
      background-color: ffffb6;
      position: absolute;
      /*top: 40px;
      left: -70px;
      transform: rotate(-90deg);*/
      top: -17px;
      left: -2px;
    }
    h3 {margin-top: 3em; margin-bottom: 5px;}
    hr {max-width: 400px; margin-left: 0; margin-right:20px; 
      margin-top: 5px;height:1px;background-color: black;border: none;}
  </style>
</head>
<body style="position: relative;">
  <header>
    CS 410 Computational Science
  </header>
  <p>
    <a href="https://canvas.uoregon.edu/courses/287894">Canvas</a>
  </p>
</body>
</html>
